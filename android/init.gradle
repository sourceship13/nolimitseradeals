// Gradle init script to set PATH and Node.js for React Native builds
// This must be loaded via --init-script or org.gradle.jvmargs

def home = System.getProperty("user.home")
def androidDir = new File(System.getProperty("user.dir")).absolutePath
def nodePaths = androidDir + ":/usr/local/bin:" + home + "/.nvm/versions/node/v20.19.5/bin"
def currentPath = System.getenv("PATH") ?: ""
def newPath = nodePaths + ":" + currentPath

// Use reflection to modify process environment
try {
    def processEnvClass = Class.forName("java.lang.ProcessEnvironment")
    def theEnvironmentField = processEnvClass.getDeclaredField("theEnvironment")
    theEnvironmentField.setAccessible(true)
    def env = theEnvironmentField.get(null)
    env.put("PATH", newPath)
    println "[init.gradle] PATH updated with node paths"
} catch (Exception e) {
    println "[init.gradle] Could not update PATH via ProcessEnvironment: " + e.message
    // Try alternative method
    try {
        def env = System.getenv()
        def field = env.getClass().getDeclaredField('m')
        field.setAccessible(true)
        def map = field.get(env)
        map.put("PATH", newPath)
        println "[init.gradle] PATH updated via alternative method"
    } catch (Exception e2) {
        println "[init.gradle] All PATH update methods failed"
    }
}
