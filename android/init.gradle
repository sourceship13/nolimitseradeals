// Gradle init script to set PATH and Node.js for React Native builds
// This must be loaded via --init-script or org.gradle.jvmargs

def home = System.getProperty("user.home")
def androidDir = new File(System.getProperty("user.dir")).absolutePath
def nodePaths = androidDir + ":/usr/local/bin:" + home + "/.nvm/versions/node/v20.19.5/bin"
def currentPath = System.getenv("PATH") ?: ""
def newPath = nodePaths + ":" + currentPath

// Set system property for node path that React Native can use
System.setProperty("NODE_BINARY_PATH", home + "/.nvm/versions/node/v20.19.5/bin/node")

// For Java 17+, we can't modify ProcessEnvironment directly due to module restrictions
// Instead, we'll rely on the node wrapper scripts and system properties
println "[init.gradle] Node paths configured: " + nodePaths
println "[init.gradle] NODE_BINARY_PATH set to: " + System.getProperty("NODE_BINARY_PATH")
