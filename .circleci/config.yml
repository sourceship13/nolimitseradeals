version: 2.1

executors:
  android-executor:
    docker:
      - image: cimg/android:2024.09-node
    working_directory: ~/repo
    environment:
      LANG: en_US.UTF-8
      NODE_ENV: development
      JAVA_OPTS: "-Xms512m -Xmx4g"
      GRADLE_OPTS: '-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx3g -XX:+HeapDumpOnOutOfMemoryError"'

  rn-executor:
    docker:
      - image: cimg/node:18.20
    working_directory: ~/repo
    environment:
      LANG: en_US.UTF-8
      NODE_ENV: development

jobs:
  install_dependencies:
    executor: rn-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-npm-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - v1-npm-{{ arch }}-{{ .Branch }}
            - v1-npm-
      - run:
          name: Install Node.js dependencies
          command: npm ci
      - save_cache:
          key: v1-npm-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - persist_to_workspace:
          root: .
          paths:
            - node_modules
            - package.json
            - package-lock.json

  build_android:
    executor: android-executor
    resource_class: xlarge
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install Ruby dependencies
          command: |
            cd android
            bundle install
            bundle update fastlane
      - run:
          name: Accept Android SDK licenses
          command: yes | sdkmanager --licenses || true
      - restore_cache:
          keys:
            - v1-gradle-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
            - v1-gradle-
      - run:
          name: Build Android APK (release)
          command: |
            cd android
            ./gradlew assembleRelease --no-daemon --stacktrace
      - save_cache:
          key: v1-gradle-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
          paths:
            - ~/.gradle
            - android/.gradle
      - store_artifacts:
          path: android/app/build/outputs/apk/release/app-release.apk
          destination: android_apk

  build_ios:
    macos:
      xcode: "16.1.0"
    resource_class: macos.m1.medium.gen1
    working_directory: ~/repo
    environment:
      FL_OUTPUT_DIR: output
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install Ruby dependencies
          command: |
            cd ios
            bundle update
            bundle install
      - restore_cache:
          keys:
            - v1-pods-{{ checksum "ios/Podfile.lock" }}
            - v1-pods-
      - run:
          name: Install CocoaPods
          command: |
            cd ios
            bundle exec pod install
      - save_cache:
          key: v1-pods-{{ checksum "ios/Podfile.lock" }}
          paths:
            - ios/Pods
            - ~/.cocoapods
      - run:
          name: Setup code signing
          command: |
            # Create keychain
            security create-keychain -p "" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain
            
            # Import certificate
            echo "$CERTIFICATE_P12" | base64 --decode > cert.p12
            security import cert.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
            
            # Install provisioning profile
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
      - run:
          name: Build and deploy to TestFlight
          command: |
            cd ios
            bundle exec fastlane beta 2>&1 | tee build.log || {
              echo ""
              echo "====== BUILD FAILED ======"
              echo ""
              echo "Last 200 lines of output:"
              tail -200 build.log
              echo ""
              echo "Checking for specific errors:"
              echo ""
              echo "=== Code Signing Errors ==="
              grep -i "signing" build.log | tail -20 || echo "No signing errors"
              echo ""
              echo "=== Provisioning Profile Errors ==="
              grep -i "provisioning" build.log | tail -20 || echo "No provisioning errors"
              echo ""
              echo "=== Build Errors ==="
              grep "error:" build.log | tail -20 || echo "No build errors found"
              echo ""
              echo "=== Failed Tasks ==="
              grep "FAILED" build.log | tail -20 || echo "No failed tasks"
              echo ""
              exit 1
            }
      - run:
          name: Display App Version and Build Number
          command: |
            APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" ios/nolimitseradeals/Info.plist)
            BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" ios/nolimitseradeals/Info.plist)
            echo "App Version: $APP_VERSION"
            echo "Build Number: $BUILD_NUMBER"
      - store_artifacts:
          path: ios/output
          destination: ios_build

workflows:
  version: 2
  build_and_deploy:
    jobs:
      - install_dependencies:
          context:
            - nolimitsera-context
      - build_android:
          context:
            - nolimitsera-context
          requires:
            - install_dependencies
      - build_ios:
          context:
            - nolimitsera-context
          requires:
            - install_dependencies