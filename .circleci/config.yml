version: 2.1

executors:
  android-executor:
    docker:
      - image: cimg/android:2024.09-node
    working_directory: ~/repo
    environment:
      LANG: en_US.UTF-8
      NODE_ENV: development

  rn-executor:
    docker:
      - image: cimg/node:18.20
    working_directory: ~/repo
    environment:
      LANG: en_US.UTF-8
      NODE_ENV: development

jobs:
  install_dependencies:
    executor: rn-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-npm-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - v1-npm-{{ arch }}-{{ .Branch }}
            - v1-npm-
      - run:
          name: Install Node.js dependencies
          command: npm ci
      - save_cache:
          key: v1-npm-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - persist_to_workspace:
          root: .
          paths:
            - node_modules
            - package.json
            - package-lock.json

  build_android:
    executor: android-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Accept Android SDK licenses
          command: yes | sdkmanager --licenses || true
      - restore_cache:
          keys:
            - v1-gradle-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
            - v1-gradle-
      - run:
          name: Build Android APK (release)
          command: |
            cd android
            ./gradlew --no-daemon clean assembleRelease
      - save_cache:
          key: v1-gradle-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
          paths:
            - ~/.gradle
            - android/.gradle
      - store_artifacts:
          path: android/app/build/outputs/apk/release/app-release.apk
          destination: android_apk
      - store_artifacts:
          path: android/app/build/outputs/mapping/release
          destination: android_mapping

  build_ios:
    macos:
      xcode: "15.4.0"
    resource_class: macos.m1.medium.gen1
    working_directory: ~/repo
    environment:
      FL_OUTPUT_DIR: output
      FASTLANE_LANE: beta
    steps:
      - checkout
      - attach_workspace:
          at: .
      
      - run:
          name: Show versions
          command: |
            node --version
            npm --version
            xcodebuild -version
            sw_vers
      
      - restore_cache:
          keys:
            - v1-pods-{{ checksum "ios/Podfile.lock" }}
            - v1-pods-
      
      - run:
          name: Install CocoaPods
          command: |
            cd ios
            pod install --repo-update
      
      - save_cache:
          key: v1-pods-{{ checksum "ios/Podfile.lock" }}
          paths:
            - ios/Pods
            - ~/.cocoapods
      
      - run:
          name: Setup code signing
          command: |
            # This requires MATCH_PASSWORD, MATCH_GIT_URL environment variables
            # Or you can use manual signing with certificates/profiles
            echo "Setting up code signing..."
            # Add your signing setup here
      
      - run:
          name: Build iOS archive (Release)
          command: |
            cd ios
            
            # Build archive
            xcodebuild \
              -workspace nolimitseradeals.xcworkspace \
              -scheme nolimitseradeals \
              -configuration Release \
              -sdk iphoneos \
              -archivePath build/nolimitseradeals.xcarchive \
              -allowProvisioningUpdates \
              CODE_SIGN_STYLE=Automatic \
              clean archive
      
      - run:
          name: Export IPA
          command: |
            cd ios
            
            # Create export options
            cat > ExportOptions.plist \<<EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key><string>app-store</string>
              <key>uploadSymbols</key><true/>
              <key>compileBitcode</key><false/>
              <key>signingStyle</key><string>automatic</string>
              <key>stripSwiftSymbols</key><true/>
            </dict>
            </plist>
            EOF
            
            # Export archive
            xcodebuild -exportArchive \
              -archivePath build/nolimitseradeals.xcarchive \
              -exportOptionsPlist ExportOptions.plist \
              -exportPath build \
              -allowProvisioningUpdates
      
      - store_artifacts:
          path: ios/build
          destination: ios_build
      
      - run:
          name: Upload to App Store Connect (optional)
          command: |
            if [ -z "$APPLE_ID" ] || [ -z "$APP_SPECIFIC_PASSWORD" ]; then
              echo "Skipping App Store upload - credentials not configured"
              exit 0
            fi
            
            cd ios
            IPA_PATH="build/nolimitseradeals.ipa"
            
            if [ ! -f "$IPA_PATH" ]; then
              echo "❌ IPA not found at $IPA_PATH"
              exit 1
            fi
            
            xcrun altool --upload-app \
              --type ios \
              --file "$IPA_PATH" \
              --username "$APPLE_ID" \
              --password "$APP_SPECIFIC_PASSWORD"

workflows:
  version: 2
  build_and_deploy:
    jobs:
      - install_dependencies
      - build_android:
          requires:
            - install_dependencies
      - build_ios:
          requires:
            - install_dependencies