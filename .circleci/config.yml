build_ios:
  macos:
    xcode: "16.4.0"          # use an image that exists in CircleCI; adjust if needed
  resource_class: macos.m1.medium
  working_directory: ~/repo
  steps:
    - checkout

    - run:
        name: Preflight (accept Xcode license & show env)
        command: |
          sudo xcodebuild -license accept
          xcodebuild -version
          sw_vers
          env | sort

    - run:
        name: Install tools
        command: |
          brew update
          brew install xcpretty || true
          sudo gem install cocoapods -N
          npm --version
          pod --version

    - run:
        name: Install iOS deps
        command: |
          cd ios
          pod install

    - run:
        name: Autoincrement build number
        command: |
          cd ios
          agvtool new-version -all $(($CIRCLE_BUILD_NUM + 1))

    - run:
        name: Build archive
        command: |
          set -euo pipefail
          cd ios
          xcodebuild \
            -workspace nolimitseradeals.xcworkspace \
            -scheme nolimitseradeals \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/nolimitseradeals.xcarchive \
            clean archive \
          | xcpretty && exit ${PIPESTATUS[0]}

    - run:
        name: Export IPA (app-store)
        command: |
          set -euo pipefail
          cd ios
          cat > ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
           "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
            <key>destination</key><string>export</string>
            <key>signingStyle</key><string>automatic</string>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $PWD/build/nolimitseradeals.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build \
          | xcpretty && exit ${PIPESTATUS[0]}

    - store_artifacts:
        path: ios/build
        destination: ios_build

    # >>> Replace altool with iTMSTransporter (much clearer errors)
    - run:
        name: Upload to App Store Connect (Transporter verbose)
        command: |
          set -euo pipefail
          cd ios
          IPA_PATH="$PWD/build/nolimitseradeals.ipa"
          if [ ! -f "$IPA_PATH" ]; then
            echo "IPA not found at $IPA_PATH"; exit 1
          fi
          # Env vars required: APPLE_ID, APP_SPECIFIC_PASSWORD, ASC_PROVIDER (team short name)
          xcrun iTMSTransporter -m upload \
            -u "$APPLE_ID" \
            -p "$APP_SPECIFIC_PASSWORD" \
            -assetFile "$IPA_PATH" \
            -provider "$ASC_PROVIDER" \
            -v eXtreme
