            echo "✅ Pre-bundle successful"
      - run:
          name: Build and upload to TestFlight (Production)
          command: |
            cd ios
            bundle exec fastlane production
      - run:
          name: Display App Version and Build Number
          command: |
            APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" ios/nolimitseradeals/Info.plist)
            BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" ios/nolimitseradeals/Info.plist)
            echo "Production App Version: $APP_VERSION"
            echo "Production Build Number: $BUILD_NUMBER"
      - store_artifacts:
          path: ios/build
          destination: ios_production_build

workflows:
  version: 2
  build_and_deploy_staging:
    jobs:
      - install_dependencies:
          context:
            - nolimitsera-context
          filters:
            branches:
              only:
                - main
                - circle
              # Temporarily disabled develop branch builds
              # only:
              #   - main
              #   - develop
      - build_android:
          context:
            - nolimitsera-context
          requires:
            - install_dependencies
          filters:
            branches:
              only:
                - main
                - circle
      - build_ios_staging:
          context:
            - nolimitsera-context
          requires:
            - install_dependencies
          filters:
            branches:
              only:
                - main
                - circle

  deploy_production:
    jobs:
      - install_dependencies:
          context:
            - nolimitsera-context
          filters:
            branches:
              only:
                - main
                - circle
            tags:
              only: /^v.*/
      - build_ios_production:
          context:
            - nolimitsera-context
          requires:
            - install_dependencies
          filters:
            branches:
              only:
                - main
                - circle
            tags:
              only: /^v.*/
