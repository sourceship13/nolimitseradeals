version: 2.1

executors:
  android-executor:
    docker:
      - image: cimg/android:2024.09-node
    working_directory: ~/repo
    environment:
      LANG: en_US.UTF-8
      NODE_ENV: development

  rn-executor:
    docker:
      - image: cimg/node:18.20
    working_directory: ~/repo
    environment:
      LANG: en_US.UTF-8
      NODE_ENV: development

jobs:
  install_dependencies:
    executor: rn-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-npm-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - v1-npm-{{ arch }}-{{ .Branch }}
            - v1-npm-
      - run:
          name: Install Node.js dependencies
          command: npm ci
      - save_cache:
          key: v1-npm-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - persist_to_workspace:
          root: .
          paths:
            - node_modules
            - package.json
            - package-lock.json

  build_android:
    executor: android-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Accept Android SDK licenses
          command: yes | sdkmanager --licenses || true
      - restore_cache:
          keys:
            - v1-gradle-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
            - v1-gradle-
      - run:
          name: Build Android APK (release)
          command: |
            cd android
            ./gradlew --no-daemon clean assembleRelease
      - save_cache:
          key: v1-gradle-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
          paths:
            - ~/.gradle
            - android/.gradle
      - store_artifacts:
          path: android/app/build/outputs/apk/release/app-release.apk
          destination: android_apk
      - store_artifacts:
          path: android/app/build/outputs/mapping/release
          destination: android_mapping

  build_ios:
    macos:
      xcode: "16.1.0"
    resource_class: macos.m1.medium.gen1
    working_directory: ~/repo
    environment:
      FL_OUTPUT_DIR: output
      FASTLANE_LANE: beta
    steps:
      - checkout
      - attach_workspace:
          at: .
      
      - run:
          name: Show versions
          command: |
            node --version
            npm --version
            xcodebuild -version
            sw_vers
      
      - restore_cache:
          keys:
            - v1-pods-{{ checksum "ios/Podfile.lock" }}
            - v1-pods-
      
      - run:
          name: Install Fastlane
          command: |
            sudo gem install fastlane -NV
            fastlane --version
      
      - run:
          name: Install CocoaPods
          command: |
            cd ios
            pod install --repo-update
      
      - save_cache:
          key: v1-pods-{{ checksum "ios/Podfile.lock" }}
          paths:
            - ios/Pods
            - ~/.cocoapods
      
      - run:
          name: Test SSH Connection to GitHub
          command: |
            echo "🔍 Testing SSH connection to GitHub..."
            ssh -T git@github.com -o StrictHostKeyChecking=no || true
            echo "✅ SSH test complete"
      
      - run:
          name: Setup code signing with Fastlane Match
          command: |
            cd ios
            
            # Debug: Check if MATCH_PASSWORD is set
            if [ -z "$MATCH_PASSWORD" ]; then
              echo "❌ ERROR: MATCH_PASSWORD is not set!"
              echo "Please add it to CircleCI Environment Variables"
              exit 1
            else
              echo "✅ MATCH_PASSWORD is set"
            fi
            
            # Debug: Show what git URL Match will use
            echo "🔍 Checking Matchfile configuration..."
            cat Matchfile
            
            # Disable SSH host key checking for GitHub
            mkdir -p ~/.ssh
            ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
            
            # Create a temporary keychain
            security create-keychain -p "" temp.keychain
            security default-keychain -s temp.keychain
            security unlock-keychain -p "" temp.keychain
            security set-keychain-settings -t 3600 -u temp.keychain
            
            # Run fastlane match to download and install certificates
            # Explicitly export MATCH_PASSWORD for fastlane
            export MATCH_PASSWORD="$MATCH_PASSWORD"
            export GIT_SSH_COMMAND="ssh -v"
            fastlane match appstore --readonly --verbose --app_identifier "org.sera.dev.nolimitsera"
            
            # Debug: List installed provisioning profiles
            echo ""
            echo "🔍 Installed provisioning profiles:"
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles found"
      
      - run:
          name: Build iOS archive (Release)
          command: |
            cd ios
            
            # Build archive with detailed output
            set -o pipefail
            xcodebuild \
              -workspace nolimitseradeals.xcworkspace \
              -scheme nolimitseradeals \
              -configuration Release \
              -sdk iphoneos \
              -archivePath build/nolimitseradeals.xcarchive \
              -allowProvisioningUpdates \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              clean archive 2>&1 | tee xcodebuild.log
            
            # Capture the exit code
            BUILD_EXIT_CODE=${PIPESTATUS[0]}
            
            # If build failed, show detailed errors
            if [ $BUILD_EXIT_CODE -ne 0 ]; then
              echo ""
              echo "=========================================="
              echo "🔍 BUILD FAILED - Searching for errors..."
              echo "=========================================="
              echo ""
              
              # Show all errors
              echo "--- ALL ERRORS ---"
              grep "error:" xcodebuild.log || echo "No 'error:' lines found"
              
              echo ""
              echo "--- CODE SIGNING ISSUES ---"
              grep -i "signing\|profile\|certificate\|provisioning" xcodebuild.log | grep -i "error\|fail\|invalid" || echo "No signing errors found"
              
              echo ""
              echo "--- LAST 50 LINES OF BUILD ---"
              tail -50 xcodebuild.log
              
              exit $BUILD_EXIT_CODE
            fi
            
            echo "✅ Archive built successfully"
      
      - run:
          name: Export IPA
          command: |
            cd ios
            
            # Create export options
            cat > ExportOptions.plist \<<EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key><string>app-store</string>
              <key>teamID</key><string>$APPLE_TEAM_ID</string>
              <key>uploadSymbols</key><true/>
              <key>compileBitcode</key><false/>
              <key>stripSwiftSymbols</key><true/>
            </dict>
            </plist>
            EOF
            
            # Export archive
            xcodebuild -exportArchive \
              -archivePath build/nolimitseradeals.xcarchive \
              -exportOptionsPlist ExportOptions.plist \
              -exportPath build \
              -allowProvisioningUpdates
      
      - store_artifacts:
          path: ios/build
          destination: ios_build
      
      - run:
          name: Upload to App Store Connect (optional)
          command: |
            if [ -z "$FASTLANE_USER" ] || [ -z "$FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD" ]; then
              echo "⚠️  Skipping App Store upload - credentials not configured"
              echo "To enable uploads, set FASTLANE_USER and FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD"
              exit 0
            fi
            
            cd ios
            IPA_PATH="build/nolimitseradeals.ipa"
            
            if [ ! -f "$IPA_PATH" ]; then
              echo "❌ IPA not found at $IPA_PATH"
              exit 1
            fi
            
            echo "📤 Uploading to App Store Connect..."
            xcrun altool --upload-app \
              --type ios \
              --file "$IPA_PATH" \
              --username "$FASTLANE_USER" \
              --password "$FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD"
            
            echo "✅ Upload complete!"

workflows:
  version: 2
  build_and_deploy:
    jobs:
      - install_dependencies:
          context:
            - nolimitsera-context
      - build_android:
          context:
            - nolimitsera-context
          requires:
            - install_dependencies
      - build_ios:
          context:
            - nolimitsera-context
          requires:
            - install_dependencies