version: 2.1

executors:
  android-executor:
    docker:
      - image: cimg/android:2024.09-node
    working_directory: ~/repo
    environment:
      LANG: en_US.UTF-8
      NODE_ENV: development

  rn-executor:
    docker:
      - image: cimg/node:18.20
    working_directory: ~/repo
    environment:
      LANG: en_US.UTF-8
      NODE_ENV: development

jobs:
  install_dependencies:
    executor: rn-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-npm-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - v1-npm-{{ arch }}-{{ .Branch }}
            - v1-npm-
      - run:
          name: Install Node.js dependencies
          command: npm ci
      - save_cache:
          key: v1-npm-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - persist_to_workspace:
          root: .
          paths:
            - node_modules
            - package.json
            - package-lock.json

  build_android:
    executor: android-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      
      - run:
          name: Accept Android SDK licenses
          command: yes | sdkmanager --licenses || true
      
      - run:
          name: Setup Android environment
          command: |
            # Set Node binary path
            echo "export NODE_BINARY=$(which node)" >> $BASH_ENV
            source $BASH_ENV
            
            # Create local.properties
            cat > android/local.properties << EOF
            sdk.dir=/home/circleci/android-sdk
            EOF
            
            echo "Node binary: $NODE_BINARY"
            echo "Node version: $(node --version)"
            echo "NPM version: $(npm --version)"
      
      - restore_cache:
          keys:
            - v1-gradle-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
            - v1-gradle-
      
      - run:
          name: Clean Gradle cache
          command: |
            cd android
            ./gradlew clean --no-daemon
      
      - run:
          name: Build Android APK (release)
          command: |
            cd android
            export NODE_BINARY=$(which node)
            echo "Building with Node at: $NODE_BINARY"
            ./gradlew assembleRelease \
              --no-daemon \
              --stacktrace \
              -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m"
      
      - save_cache:
          key: v1-gradle-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
          paths:
            - ~/.gradle
            - android/.gradle
      
      - store_artifacts:
          path: android/app/build/outputs/apk/release/app-release.apk
          destination: android_apk
      
      - store_artifacts:
          path: android/app/build/outputs/mapping/release
          destination: android_mapping

  build_ios:
    macos:
      xcode: "16.1.0"
    resource_class: macos.m1.medium.gen1
    working_directory: ~/repo
    environment:
      FL_OUTPUT_DIR: output
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout
      - attach_workspace:
          at: .
      
      - run:
          name: Show versions
          command: |
            node --version
            npm --version
            xcodebuild -version
            sw_vers
      
      - restore_cache:
          keys:
            - v1-pods-{{ checksum "ios/Podfile.lock" }}
            - v1-pods-
      
      - restore_cache:
          keys:
            - v1-gems-{{ checksum "ios/Gemfile.lock" }}
            - v1-gems-
      
      - run:
          name: Install Ruby gems
          command: |
            cd ios
            bundle install
      
      - save_cache:
          key: v1-gems-{{ checksum "ios/Gemfile.lock" }}
          paths:
            - ios/vendor/bundle
      
      - run:
          name: Install CocoaPods
          command: |
            cd ios
            bundle exec pod install
      
      - save_cache:
          key: v1-pods-{{ checksum "ios/Podfile.lock" }}
          paths:
            - ios/Pods
            - ~/.cocoapods
      
      - run:
          name: Setup keychain for code signing
          command: |
            # Create a temporary keychain
            security create-keychain -p "" temp.keychain
            security default-keychain -s temp.keychain
            security unlock-keychain -p "" temp.keychain
            security set-keychain-settings -t 3600 -u temp.keychain

      - run:
          name: Verify API Key environment variables
          command: |
            echo "Checking API Key environment variables..."
            if [ -z "$APP_STORE_CONNECT_API_KEY_KEY_ID" ]; then
              echo "❌ APP_STORE_CONNECT_API_KEY_KEY_ID is not set"
              exit 1
            fi
            if [ -z "$APP_STORE_CONNECT_API_KEY_ISSUER_ID" ]; then
              echo "❌ APP_STORE_CONNECT_API_KEY_ISSUER_ID is not set"
              exit 1
            fi
            if [ -z "$APP_STORE_CONNECT_API_KEY_KEY" ]; then
              echo "❌ APP_STORE_CONNECT_API_KEY_KEY is not set"
              exit 1
            fi
            echo "✅ All API Key environment variables are set"
            echo "Key ID: $APP_STORE_CONNECT_API_KEY_KEY_ID"
            echo "Issuer ID: $APP_STORE_CONNECT_API_KEY_ISSUER_ID"
            echo "Key length: ${#APP_STORE_CONNECT_API_KEY_KEY} characters"

      - run:
          name: Build and deploy to TestFlight
          command: |
            cd ios
            bundle exec fastlane beta || {
              echo "====== BUILD FAILED - Showing detailed error log ======"
              if [ -f ~/Library/Logs/gym/nolimitseradeals-nolimitseradeals.log ]; then
                echo "Last 100 lines of build log:"
                tail -100 ~/Library/Logs/gym/nolimitseradeals-nolimitseradeals.log
                echo ""
                echo "Searching for errors:"
                grep "error:" ~/Library/Logs/gym/nolimitseradeals-nolimitseradeals.log || echo "No errors found in log"
              fi
              exit 1
            }
      
      - run:
          name: Display App Version and Build Number
          command: |
            APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" ios/nolimitseradeals/Info.plist)
            BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" ios/nolimitseradeals/Info.plist)
            echo "App Version: $APP_VERSION"
            echo "Build Number: $BUILD_NUMBER"
      
      - run:
          name: List build artifacts
          command: |
            echo "📦 Contents of ios/build directory:"
            ls -lah ios/build/ || echo "Build directory not found"
            echo ""
            echo "🔍 Looking for IPA file:"
            find ios -name "*.ipa" || echo "No IPA files found"
            echo ""
            echo "📝 IPA file details:"
            file ios/build/nolimitseradeals.ipa || echo "IPA not found"
            echo ""
            echo "📊 IPA file size:"
            du -h ios/build/nolimitseradeals.ipa || echo "IPA not found"
      
      - run:
          name: Rename IPA for clarity
          command: |
            cp ios/build/nolimitseradeals.ipa ios/nolimitseradeals-build-${CIRCLE_BUILD_NUM}.ipa
            echo "✅ Created: ios/nolimitseradeals-build-${CIRCLE_BUILD_NUM}.ipa"
      
      - store_artifacts:
          path: ios/nolimitseradeals-build-${CIRCLE_BUILD_NUM}.ipa
          destination: nolimitseradeals-build-${CIRCLE_BUILD_NUM}.ipa
      
      - store_artifacts:
          path: ios/build/nolimitseradeals.ipa
          destination: nolimitseradeals.ipa
      
      - store_artifacts:
          path: ios/build
          destination: ios_build

workflows:
  version: 2
  build_and_deploy:
    jobs:
      - install_dependencies:
          context:
            - nolimitsera-context
      - build_android:
          context:
            - nolimitsera-context
          requires:
            - install_dependencies
      - build_ios:
          context:
            - nolimitsera-context
          requires:
            - install_dependencies