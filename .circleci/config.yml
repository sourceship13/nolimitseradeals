version: 2.1

executors:
  android-executor:
    docker:
      - image: cimg/android:2024.09-node
    working_directory: ~/repo
    environment:
      LANG: en_US.UTF-8
      NODE_ENV: development
      JAVA_OPTS: "-Xms512m -Xmx4g"
      GRADLE_OPTS: '-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx3g -XX:+HeapDumpOnOutOfMemoryError"'

  rn-executor:
    docker:
      - image: cimg/node:18.20
    working_directory: ~/repo
    environment:
      LANG: en_US.UTF-8
      NODE_ENV: development

jobs:
  install_dependencies:
    executor: rn-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-npm-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - v1-npm-{{ arch }}-{{ .Branch }}
            - v1-npm-
      - run:
          name: Configure npm authentication
          command: |
            echo "//registry.npmjs.org/:_authToken=${FRIBEE_NPM_TOKEN}" > ~/.npmrc
            echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
      - run:
          name: Install Node.js dependencies
          command: npm ci
      - save_cache:
          key: v1-npm-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - persist_to_workspace:
          root: .
          paths:
            - node_modules
            - package.json
            - package-lock.json

  build_android:
    executor: android-executor
    resource_class: xlarge
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Verify Node installation
          command: |
            echo "Node path: $(which node)"
            echo "Node version: $(node --version)"
            echo "NPM version: $(npm --version)"
      - restore_cache:
          keys:
            - v3-android-gems-{{ checksum "android/Gemfile.lock" }}
            - v3-android-gems-
      - run:
          name: Install Ruby dependencies
          command: |
            cd android
            # Clear any stale bundle config
            rm -rf .bundle vendor/bundle
            bundle config set --local path 'vendor/bundle'
            bundle install --jobs 4 --retry 3
      - save_cache:
          key: v3-android-gems-{{ checksum "android/Gemfile.lock" }}
          paths:
            - android/vendor/bundle
      - run:
          name: Accept Android SDK licenses
          command: yes | sdkmanager --licenses || true
      - run:
          name: Install CMake and Ninja
          command: |
            echo "y" | sdkmanager "cmake;3.22.1"
      - restore_cache:
          keys:
            - v2-gradle-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
            - v2-gradle-
      - run:
          name: Decode Android Keystore
          command: |
            # Decode the base64 keystore from environment variable
            if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
              echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/nolimitsera-release.keystore
              echo "✅ Keystore decoded successfully"
            else
              echo "⚠️  ANDROID_KEYSTORE_BASE64 not found - builds will fail at signing step"
              echo "Add the keystore as a base64 environment variable in CircleCI"
              exit 1
            fi
      - run:
          name: Build Android Staging (APK & AAB)
          command: |
            cd android
            # Clean everything including Gradle cache
            rm -rf .gradle app/.cxx app/build ~/.gradle/caches

            # Ensure CI environment is set
            export CI=true

            # Disable Sentry uploads
            export SENTRY_DISABLE_AUTO_UPLOAD=true

            # Generate all codegen artifacts first
            ./gradlew generateCodegenArtifactsFromSchema --no-daemon

            # react-native-config doesn't generate codegen properly, create empty directory
            mkdir -p ../node_modules/react-native-config/android/build/generated/source/codegen/jni

            # Build Staging APK
            ./gradlew assembleStagingRelease --no-daemon --stacktrace

            # Build Staging AAB
            ./gradlew bundleStagingRelease --no-daemon --stacktrace
      - run:
          name: Build Android Production (APK & AAB)
          command: |
            cd android
            # Build Production APK
            ./gradlew assembleProductionRelease --no-daemon --stacktrace

            # Build Production AAB
            ./gradlew bundleProductionRelease --no-daemon --stacktrace
      - save_cache:
          key: v2-gradle-{{ checksum "android/build.gradle" }}-{{ checksum "android/app/build.gradle" }}
          paths:
            - ~/.gradle
            - android/.gradle
      - store_artifacts:
          path: android/app/build/outputs/apk/staging/release/app-staging-release.apk
          destination: artifacts/staging/app-staging-release.apk
      - store_artifacts:
          path: android/app/build/outputs/bundle/stagingRelease/app-staging-release.aab
          destination: artifacts/staging/app-staging-release.aab
      - store_artifacts:
          path: android/app/build/outputs/apk/production/release/app-production-release.apk
          destination: artifacts/production/app-production-release.apk
      - store_artifacts:
          path: android/app/build/outputs/bundle/productionRelease/app-production-release.aab
          destination: artifacts/production/app-production-release.aab

  build_ios_staging:
    macos:
      xcode: "26.2.0"
    resource_class: m4pro.medium
    working_directory: ~/repo
    environment:
      FL_OUTPUT_DIR: output
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Disable Sentry uploads completely
          command: |
            cat > node_modules/@sentry/cli/js/helper.js \<< 'EOF'
            module.exports = {
              execute: function() { return Promise.resolve(); },
              getPath: function() { return '/usr/bin/true'; }
            };
            EOF
            echo "✅ Disabled @sentry/cli"
      - run:
          name: Install Ruby 3.3.5
          command: |
            if ! rbenv versions | grep -q "3.3.5"; then
              echo "Installing Ruby 3.3.5..."
              rbenv install 3.3.5
            fi
            rbenv global 3.3.5
            ruby --version
      - run:
          name: Install Ruby dependencies
          command: |
            cd ios
            bundle update
            bundle install
      - restore_cache:
          keys:
            - v1-pods-{{ checksum "ios/Podfile.lock" }}
            - v1-pods-
      - run:
          name: Install CocoaPods
          command: |
            cd ios
            bundle exec pod repo update
            bundle exec pod install
      - save_cache:
          key: v1-pods-{{ checksum "ios/Podfile.lock" }}
          paths:
            - ios/Pods
            - ~/.cocoapods
      - run:
          name: Setup SSH and Keychain for Match
          command: |
            mkdir -p ~/.ssh
            echo "$MATCH_GIT_SSH_KEY" | base64 --decode > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh-keyscan github.com >> ~/.ssh/known_hosts

            cat > ~/.ssh/config \<< 'EOF'
            Host github.com-fastlane-match
              HostName github.com
              User git
              IdentityFile ~/.ssh/id_ed25519
              IdentitiesOnly yes
              StrictHostKeyChecking no
            EOF

            KEYCHAIN_PATH=~/Library/Keychains/fastlane.keychain-db
            KEYCHAIN_PASSWORD=temp_password

            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security default-keychain -s "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
            security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)

            echo "✅ Keychain setup complete"
      - run:
          name: Strip bitcode from Hermes
          command: |
            cd ios
            HERMES_FRAMEWORK="Pods/hermes-engine/destroot/Library/Frameworks/universal/hermes.framework/hermes"
            if [ -f "$HERMES_FRAMEWORK" ]; then
              echo "Stripping bitcode from Hermes..."
              xcrun bitcode_strip -r "$HERMES_FRAMEWORK" -o "$HERMES_FRAMEWORK"
              echo "✅ Bitcode stripped successfully"
            else
              echo "⚠️ Hermes framework not found at expected location"
              find Pods -name "hermes.framework" -type d
            fi
      - run:
          name: Clear Metro bundler cache
          command: |
            echo "Clearing Metro bundler cache..."
            rm -rf $TMPDIR/metro-* $TMPDIR/haste-* $TMPDIR/react-* 2>/dev/null || true
            rm -rf ~/.metro 2>/dev/null || true
            echo "✅ Metro cache cleared"
      - run:
          name: Pre-bundle React Native code
          command: |
            echo "Pre-bundling React Native code to check for errors..."
            export NODE_BINARY=node
            export ENTRY_FILE=index.js
            npx react-native bundle \
              --platform ios \
              --dev false \
              --entry-file index.js \
              --bundle-output /tmp/test-bundle.js \
              --assets-dest /tmp/test-assets \
              --reset-cache
            echo "✅ Pre-bundle successful"
      - run:
          name: Build and upload to TestFlight (Staging)
          command: |
            cd ios
            bundle exec fastlane staging
      - run:
          name: Display App Version and Build Number
          command: |
            APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" ios/nolimitseradeals/Info.plist)
            BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" ios/nolimitseradeals/Info.plist)
            echo "Staging App Version: $APP_VERSION"
            echo "Staging Build Number: $BUILD_NUMBER"
      - store_artifacts:
          path: ios/build
          destination: ios_staging_build

  build_ios_production:
    macos:
      xcode: "26.2.0"
    resource_class: m4pro.medium
    working_directory: ~/repo
    environment:
      FL_OUTPUT_DIR: output
    shell: /bin/bash --login -o pipefail
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Disable Sentry uploads completely
          command: |
            cat > node_modules/@sentry/cli/js/helper.js \<< 'EOF'
            module.exports = {
              execute: function() { return Promise.resolve(); },
              getPath: function() { return '/usr/bin/true'; }
            };
            EOF
            echo "✅ Disabled @sentry/cli"
      - run:
          name: Install Ruby 3.3.5
          command: |
            if ! rbenv versions | grep -q "3.3.5"; then
              echo "Installing Ruby 3.3.5..."
              rbenv install 3.3.5
            fi
            rbenv global 3.3.5
            ruby --version
      - run:
          name: Install Ruby dependencies
          command: |
            cd ios
            bundle update
            bundle install
      - restore_cache:
          keys:
            - v1-pods-{{ checksum "ios/Podfile.lock" }}
            - v1-pods-
      - run:
          name: Install CocoaPods
          command: |
            cd ios
            bundle exec pod repo update
            bundle exec pod install
      - save_cache:
          key: v1-pods-{{ checksum "ios/Podfile.lock" }}
          paths:
            - ios/Pods
            - ~/.cocoapods
      - run:
          name: Setup SSH and Keychain for Match
          command: |
            mkdir -p ~/.ssh
            echo "$MATCH_GIT_SSH_KEY" | base64 --decode > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh-keyscan github.com >> ~/.ssh/known_hosts

            cat > ~/.ssh/config \<< 'EOF'
            Host github.com-fastlane-match
              HostName github.com
              User git
              IdentityFile ~/.ssh/id_ed25519
              IdentitiesOnly yes
              StrictHostKeyChecking no
            EOF

            KEYCHAIN_PATH=~/Library/Keychains/fastlane.keychain-db
            KEYCHAIN_PASSWORD=temp_password

            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security default-keychain -s "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
            security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)

            echo "✅ Keychain setup complete"
      - run:
          name: Strip bitcode from Hermes
          command: |
            cd ios
            HERMES_FRAMEWORK="Pods/hermes-engine/destroot/Library/Frameworks/universal/hermes.framework/hermes"
            if [ -f "$HERMES_FRAMEWORK" ]; then
