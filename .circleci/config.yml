  build_android:
    executor: rn-executor
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install Node.js dependencies
          command: npm install
      - run:
          name: Build Android APK
          command: |
            cd android
            ./gradlew assembleRelease
      - store_artifacts:
          path: android/app/build/outputs/apk/release/app-release.apk
          destination: android_apk
version: 2.1

executors:
  rn-executor:
    docker:
      - image: circleci/node:18.20-browsers
    working_directory: ~/repo
    environment:
      BUNDLE_PATH: vendor/bundle
      NODE_ENV: development
      LANG: en_US.UTF-8

jobs:
  install_dependencies:
    executor: rn-executor
    steps:
      - checkout
      - run:
          name: Install Node.js dependencies
          command: npm install
      - run:
          name: Install Ruby gems
          command: bundle install --path vendor/bundle
      - run:
          name: Install CocoaPods
          command: |
            sudo gem install cocoapods
            cd ios && pod install
      - persist_to_workspace:
          root: .
          paths:
            - node_modules
            - ios/Pods
            - vendor/bundle

  build_ios:
    macos:
      xcode: "16.4.0"
    working_directory: ~/repo
  steps:
    - checkout
    - attach_workspace:
      at: .
    - run:
      name: Install Node.js dependencies
      command: npm install
    - run:
      name: Install CocoaPods
      command: cd ios && pod install
    - run:
      name: Autoincrement iOS build number
      command: |
      cd ios
      agvtool new-version -all $(($CIRCLE_BUILD_NUM + 1))
    - run:
      name: Build iOS app
      command: |
      cd ios
      xcodebuild -workspace nolimitseradeals.xcworkspace -scheme nolimitseradeals -configuration Release -sdk iphoneos -archivePath $PWD/build/nolimitseradeals.xcarchive archive
    - run:
      name: Export IPA
      command: |
      cd ios
      xcodebuild -exportArchive -archivePath $PWD/build/nolimitseradeals.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath $PWD/build
    - store_artifacts:
      path: ios/build
      destination: ios_build
    - run:
      name: Deploy to TestFlight
      command: |
      cd ios
      xcrun altool --upload-app -f build/nolimitseradeals.ipa -t ios -u "$APPLE_ID" -p "$APP_SPECIFIC_PASSWORD"

workflows:
  version: 2
  build_and_deploy:
    jobs:
      - install_dependencies
      - build_ios:
          requires:
            - install_dependencies
      - build_android:
          requires:
            - install_dependencies
